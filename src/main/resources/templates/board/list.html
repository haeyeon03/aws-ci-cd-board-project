<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시판</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>
<div class="container">

    <h1>📋 게시판 목록</h1>

    <div class="top-bar">
        <div></div>
        <a href="/board/write" class="btn">글쓰기</a>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>제목</th>
            <th>작성자</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="board: ${boards}">
            <td><a th:href="@{/board/{id}(id=${board.id})}"
                   th:text="${board.id}"></a></td>
            <td th:text="${board.title}"></td>
            <td th:text="${board.writer}"></td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
