<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시판</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>
<div class="container">

    <h1>📋 게시판 목록</h1>

    <div class="top-bar">
        <div></div>
        <a href="/board/write" class="btn">글쓰기</a>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>제목</th>
            <th>작성자</th>
        </tr>
        </thead>

        <tbody id="board-list">
        </tbody>
    </table>

</div>

<script>
    async function loadBoards() {
        const res = await fetch("/api/boards");
        const boards = await res.json();

        const tbody = document.getElementById("board-list");
        tbody.innerHTML = "";

        boards.forEach(board => {
            const row = `
            <tr>
                <td>
                    <a href="/board/${board.id}">
                        ${board.id}
                    </a>
                </td>
                <td>${board.title}</td>
                <td>${board.writer}</td>
            </tr>
        `;
            tbody.innerHTML += row;
        });
    }

    // 페이지 로드 시 실행
    window.onload = loadBoards;
</script>

</body>
</html>
