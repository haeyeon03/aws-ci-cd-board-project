<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>글 수정</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>
<div class="container">

    <h2>🛠 글 수정</h2>

    <form th:action="@{/board/edit/{id}(id=${board.id})}" method="post">
        <input type="hidden" name="id" th:value="${board.id}">

        <input type="text" name="title" th:value="${board.title}" placeholder="제목">
        <input type="text" name="writer" th:value="${board.writer}" placeholder="작성자">
        <textarea name="content" th:text="${board.content}" placeholder="내용"></textarea>

        <!-- 버튼 그룹 -->
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button type="submit" class="btn">수정 완료</button>

            <!-- 삭제 버튼을 같은 div 안으로 이동 -->
            <form th:action="@{/board/delete/{id}(id=${board.id})}" method="post" style="margin: 0;">
                <button type="submit" class="btn delete">삭제</button>
            </form>
        </div>
    </form>

</div>
</body>
</html>
